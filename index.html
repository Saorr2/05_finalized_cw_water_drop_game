<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="brand-header">
            <img class="cw-logo-horizontal" src="img/water-can-transparent.png" alt="charity: water logo">
            <h1 class="game-title">Conserve Clean Water</h1>
        </div>
        <p class="game-tagline">Catch the clean drops, avoid the dirty ones!</p>
        <div class="difficulty-selector">
            <label for="difficulty">Difficulty:</label>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="normal" selected>Normal</option>
                <option value="hard">Hard</option>
            </select>
        </div>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span>s</div>
            <div class="lives" aria-live="polite">Lives: <span id="lives-container"></span></div>
            <button id="start-btn">Start Game</button>
            <button id="reset-btn" type="button">Reset</button>
        </div>
        <p id="status-message" aria-live="polite"></p>
        
        <div id="game-container">
        </div>
    </div>
    
    <footer class="game-footer">
        <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer" class="footer-link">
            <img src="img/cw_logo-horizontal.png" alt="charity: water" class="footer-logo">
        </a>
        <div class="footer-links">
            <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer">Our Mission</a>
            <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer">Donate</a>
            <a href="https://www.charitywater.org/about" target="_blank" rel="noopener noreferrer">About Us</a>
        </div>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
